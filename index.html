<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HogAI — AI Assistant Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- ═══════════════════════════════
        SIDEBAR
  ════════════════════════════════ -->
  <aside class="sidebar">

    <div class="sb-top">
      <div class="logo">
        <div class="logo-pig">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="24" cy="27" rx="16" ry="14" fill="rgba(255,255,255,0.12)"/>
            <ellipse cx="24" cy="20" rx="14" ry="12" fill="rgba(255,255,255,0.2)"/>
            <ellipse cx="13" cy="12" rx="5" ry="6" fill="rgba(255,255,255,0.2)" transform="rotate(-15 13 12)"/>
            <ellipse cx="35" cy="12" rx="5" ry="6" fill="rgba(255,255,255,0.2)" transform="rotate(15 35 12)"/>
            <ellipse cx="13" cy="12" rx="3" ry="4" fill="rgba(0,200,255,0.5)" transform="rotate(-15 13 12)"/>
            <ellipse cx="35" cy="12" rx="3" ry="4" fill="rgba(0,200,255,0.5)" transform="rotate(15 35 12)"/>
            <circle cx="19" cy="19" r="3.5" fill="white" opacity="0.95"/>
            <circle cx="29" cy="19" r="3.5" fill="white" opacity="0.95"/>
            <circle cx="19" cy="19" r="2.2" fill="#00aaff"/>
            <circle cx="29" cy="19" r="2.2" fill="#00aaff"/>
            <circle cx="19.9" cy="18.1" r="0.8" fill="white"/>
            <circle cx="29.9" cy="18.1" r="0.8" fill="white"/>
            <ellipse cx="24" cy="25" rx="5.5" ry="4" fill="rgba(255,255,255,0.15)"/>
            <circle cx="22" cy="25.5" r="1.3" fill="rgba(0,0,0,0.45)"/>
            <circle cx="26" cy="25.5" r="1.3" fill="rgba(0,0,0,0.45)"/>
            <line x1="33" y1="19" x2="39" y2="15" stroke="rgba(0,220,255,0.8)" stroke-width="1"/>
            <circle cx="39.5" cy="14.5" r="1.5" fill="rgba(0,220,255,0.9)"/>
            <line x1="15" y1="19" x2="9" y2="15" stroke="rgba(0,220,255,0.8)" stroke-width="1"/>
            <circle cx="8.5" cy="14.5" r="1.5" fill="rgba(0,220,255,0.9)"/>
            <path d="M20 28 Q24 31.5 28 28" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="logo-name">Hog<em>AI</em></div>
          <div class="logo-tag">AI Assistant Platform</div>
        </div>
      </div>
    </div>

    <button class="sb-new" id="newChatBtn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      + New conversation
    </button>

    <div class="sb-section">Recent</div>
    <div class="sb-list" id="chatHistory"></div>

    <div class="sb-foot">
      <div class="model-tag">
        <div class="dot"></div>
        claude-sonnet-4
      </div>
      <div class="api-tag" id="apiStatus">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Checking API…</span>
      </div>
    </div>

  </aside>

  <!-- ═══════════════════════════════
      MAIN
  ════════════════════════════════ -->
  <main class="main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title" id="chatTitle">New Chat</div>
          <div class="topbar-sub"  id="msgCount">0 messages</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="badge">HogAI v1.0</div>
        <button class="icon-btn" id="clearBtn" title="Clear chat">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
        </button>
        <button class="icon-btn" id="copyBtn" title="Copy last response">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="hog-mascot">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="24" cy="27" rx="16" ry="14" fill="rgba(255,255,255,0.12)"/>
            <ellipse cx="24" cy="20" rx="14" ry="12" fill="rgba(255,255,255,0.18)"/>
            <ellipse cx="13" cy="12" rx="5" ry="6" fill="rgba(255,255,255,0.18)" transform="rotate(-15 13 12)"/>
            <ellipse cx="35" cy="12" rx="5" ry="6" fill="rgba(255,255,255,0.18)" transform="rotate(15 35 12)"/>
            <ellipse cx="13" cy="12" rx="3" ry="4" fill="rgba(0,200,255,0.5)" transform="rotate(-15 13 12)"/>
            <ellipse cx="35" cy="12" rx="3" ry="4" fill="rgba(0,200,255,0.5)" transform="rotate(15 35 12)"/>
            <circle cx="19" cy="19" r="3.5" fill="white" opacity="0.95"/>
            <circle cx="29" cy="19" r="3.5" fill="white" opacity="0.95"/>
            <circle cx="19" cy="19" r="2.2" fill="#00aaff"/>
            <circle cx="29" cy="19" r="2.2" fill="#00aaff"/>
            <circle cx="19.9" cy="18.1" r="0.8" fill="white"/>
            <circle cx="29.9" cy="18.1" r="0.8" fill="white"/>
            <ellipse cx="24" cy="25" rx="5.5" ry="4" fill="rgba(255,255,255,0.15)"/>
            <circle cx="22" cy="25.5" r="1.3" fill="rgba(0,0,0,0.45)"/>
            <circle cx="26" cy="25.5" r="1.3" fill="rgba(0,0,0,0.45)"/>
            <line x1="33" y1="19" x2="39" y2="15" stroke="rgba(0,220,255,0.8)" stroke-width="1"/>
            <circle cx="39.5" cy="14.5" r="1.5" fill="rgba(0,220,255,0.9)"/>
            <line x1="15" y1="19" x2="9" y2="15" stroke="rgba(0,220,255,0.8)" stroke-width="1"/>
            <circle cx="8.5" cy="14.5" r="1.5" fill="rgba(0,220,255,0.9)"/>
            <line x1="24" y1="8" x2="24" y2="4" stroke="rgba(0,220,255,0.6)" stroke-width="1"/>
            <circle cx="24" cy="3.5" r="1.2" fill="rgba(0,220,255,0.8)"/>
            <path d="M20 28 Q24 31.5 28 28" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <h1>YOUR AI-ASSISTANT.<span>Powered by HogAI Platform</span></h1>
        <div class="chips" id="chips">
          <button class="chip">⚡ Explain async/await in Python</button>
          <button class="chip">🎨 Review my frontend code</button>
          <button class="chip">📝 Write a README for my project</button>
          <button class="chip">🔍 Debug this JavaScript error</button>
          <button class="chip">🚀 Best practices for FastAPI</button>
          <button class="chip">💡 Portfolio project ideas</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Message HogAI…"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span>Enter to send · Shift+Enter for new line</span>
        <span class="token-count" id="tokenCount">0 tokens</span>
      </div>
    </div>

  </main>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
